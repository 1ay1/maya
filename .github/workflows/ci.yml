name: ci

# Build maya and RUN ITS TEST SUITE on every push / PR across the three
# supported toolchains. This is the correctness gate the project was missing.
#
# Jobs:
#   build-test   — gcc-14 / clang-19 build all tests + ctest; MSVC builds the
#                  library only (the test harness mocks terminal fds with POSIX
#                  open()/pipe()/forkpty(), which MSVC lacks — the suite runs on
#                  the POSIX legs). clang-18 — the distro default — can't compile
#                  maya's C++26 (incomplete libstdc++ <expected>), so we pull
#                  clang-19 from apt.llvm.org.
#   sanitizers   — ASan+UBSan and TSan (clang), the parser/writer/render path
#                  is the most exposed to adversarial bytes. Clang's sanitizer
#                  runtimes are the reference implementation; gcc-14 also ICEs
#                  building reveal_fx.cpp under -fsanitize=address.
#   fuzz-smoke   — build the libFuzzer harnesses and run each for a few
#                  seconds (a real fuzzing run is a scheduled job, see fuzz.yml).

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build+test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc14
            os: ubuntu-latest
            cc: gcc-14
            cxx: g++-14
          - name: linux-clang19
            os: ubuntu-latest
            cc: clang-19
            cxx: clang++-19
          - name: macos-gcc
            os: macos-14
            cc: gcc-14
            cxx: g++-14
          - name: windows-msvc
            os: windows-2025
            cc: ""
            cxx: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.cc }}" = "clang-19" ]; then
            # clang-19 from apt.llvm.org (distro default clang-18 can't build
            # maya's C++26). Keep the runner's preinstalled cmake — apt's 3.28
            # doesn't recognise cxx_std_26 for clang. libstdc++-14 supplies a
            # complete <expected>; clang-tools-19 supplies clang-scan-deps-19.
            wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
            chmod +x /tmp/llvm.sh
            sudo /tmp/llvm.sh 19
            sudo apt-get install -y clang-tools-19 libstdc++-14-dev ninja-build
          else
            sudo apt-get install -y g++-14 cmake ninja-build
          fi

      - name: Install toolchain (macOS)
        if: runner.os == 'macOS'
        run: brew install gcc@14 cmake ninja || true

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        shell: bash
        run: |
          export CC="${{ matrix.cc }}" CXX="${{ matrix.cxx }}"
          # The test harness mocks a real terminal fd with POSIX
          # open()/pipe()/forkpty(), so the test executables only build on
          # Linux/macOS. On Windows we verify the C++26 LIBRARY itself compiles
          # under MSVC; the full suite runs on the POSIX legs (gcc + clang).
          if [ "$RUNNER_OS" = "Windows" ]; then TESTS=OFF; else TESTS=ON; fi
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMAYA_BUILD_TESTS=$TESTS \
            -DMAYA_BUILD_EXAMPLES=OFF \
            -DMAYA_NATIVE_TUNING=OFF

      - name: Build
        run: cmake --build build -j

      - name: Test
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure --timeout 120

  sanitizers:
    name: sanitizers (${{ matrix.san }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        san: ["address,undefined", "thread"]
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 19
          sudo apt-get install -y clang-tools-19 libstdc++-14-dev ninja-build
      - name: Configure with sanitizer
        env:
          CC: clang-19
          CXX: clang++-19
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DMAYA_BUILD_TESTS=ON \
            -DMAYA_BUILD_EXAMPLES=OFF \
            -DMAYA_NATIVE_TUNING=OFF \
            -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.san }} -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.san }}"
      - name: Build
        run: cmake --build build -j
      - name: Test under sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          TSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build --output-on-failure --timeout 240

  fuzz-smoke:
    name: fuzz harness smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang
        run: |
          sudo apt-get update
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 19
          sudo apt-get install -y clang-tools-19 libstdc++-14-dev ninja-build
      - name: Build fuzzers
        env:
          CC: clang-19
          CXX: clang++-19
        run: |
          cmake -B fuzzbuild -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DMAYA_BUILD_FUZZERS=ON \
            -DMAYA_NATIVE_TUNING=OFF
          cmake --build fuzzbuild -j
      - name: Run each fuzzer briefly
        run: |
          for f in fuzzbuild/fuzz/fuzz_*; do
            [ -x "$f" ] || continue
            echo "::group::$(basename "$f")"
            "$f" -max_total_time=20 -timeout=5 -rss_limit_mb=2048
            echo "::endgroup::"
          done
