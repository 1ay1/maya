      - Keyboard & Mouse Input: foundations/keyboard-and-mouse.md
      - The Rendering Problem: foundations/the-rendering-problem.md
      - How maya Works: foundations/how-maya-works.md
  - Guide:
      - Introduction: 00-introduction.md
      - Getting Started: 01-getting-started.md
      - The Compile-Time DSL: 02-dsl.md
      - Styling: 03-styling.md
      - Layout: 04-layout.md
      - Runtime Content: 05-runtime-content.md
      - Event Handling: 06-events.md
      - Signals & Reactivity: 09-signals.md
      - Rendering Modes: 07-rendering-modes.md
      - Canvas API: 08-canvas-api.md
      - Widget Reference: 13-widgets.md
      - Examples Walkthrough: 10-examples.md
  - Reference:
      - API Reference: 11-api-reference.md
      - Glossary: glossary.md
  - Internals:
